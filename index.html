<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nishi & Charan | Miss Meter</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --nishi-pink: #ff758f;
            --charan-blue: #4895ef;
            --bg-grad: linear-gradient(135deg, #fff1f2 0%, #e0f2fe 100%);
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            background: var(--bg-grad);
            font-family: 'Montserrat', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden;
        }

        #overlay {
            position: fixed; inset: 0; background: rgba(255,255,255,0.98);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; transition: 0.8s ease;
        }

        .main-title {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: var(--nishi-pink);
            margin: 0;
            cursor: pointer;
            text-shadow: 2px 4px 10px rgba(255, 117, 143, 0.2);
        }

        .sub-text {
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .container {
            display: flex; gap: 40px; padding: 40px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 30px 60px rgba(0,0,0,0.05);
        }

        .vial-wrapper { display: flex; flex-direction: column; align-items: center; }

        .glass-vial {
            width: 85px; height: 320px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 100px;
            border: 5px solid white;
            position: relative;
            overflow: hidden;
        }

        .liquid {
            position: absolute; bottom: 0; width: 100%; height: 0%;
            transition: height 2s cubic-bezier(0.23, 1, 0.32, 1);
        }

        #nishiLiquid { background: linear-gradient(180deg, #ffafcc, var(--nishi-pink)); }
        #charanLiquid { background: linear-gradient(180deg, #a2d2ff, var(--charan-blue)); }

        .counter-badge {
            margin-top: 15px; font-weight: 600; color: #555; font-size: 0.9rem;
        }

        .action-btn {
            width: 65px; height: 65px; border-radius: 50%; border: none;
            color: white; font-size: 1.5rem; cursor: pointer;
            margin-top: 20px; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            display: flex; align-items: center; justify-content: center;
        }

        .nishi-btn { background: var(--nishi-pink); }
        .charan-btn { background: var(--charan-blue); }
        .action-btn:disabled { filter: grayscale(1); opacity: 0.2; cursor: not-allowed; }

        .footer-info {
            position: absolute; bottom: 40px; text-align: center;
            color: #999; font-size: 0.8rem; font-style: italic;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="font-family: 'Dancing Script'; font-size: 3rem; color: #ff758f;">Hey there...</h1>
        <p style="color: #888; margin-bottom: 40px;">Who is checking in today?</p>
        <div style="display: flex; gap: 20px;">
            <button onclick="setIdentity('nishi')" class="action-btn nishi-btn" style="width: auto; border-radius: 15px; padding: 0 30px;">I'm Nishi</button>
            <button onclick="setIdentity('charan')" class="action-btn charan-btn" style="width: auto; border-radius: 15px; padding: 0 30px;">I'm Charan</button>
        </div>
    </div>

    <h1 class="main-title" onclick="handleSecret()">MISS meter</h1>
    <div class="sub-text">Thinking of You</div>

    <div class="container">
        <div class="vial-wrapper">
            <span style="font-weight: 600; margin-bottom: 10px; color: #ff758f;">Nishi</span>
            <div class="glass-vial"><div id="nishiLiquid" class="liquid"></div></div>
            <div class="counter-badge"><span id="nishiVal">0</span> / 1000</div>
            <button id="nishiBtn" class="action-btn nishi-btn" onclick="addMiss('nishi')">❤️</button>
        </div>

        <div class="vial-wrapper">
            <span style="font-weight: 600; margin-bottom: 10px; color: #4895ef;">Charan</span>
            <div class="glass-vial"><div id="charanLiquid" class="liquid"></div></div>
            <div class="counter-badge"><span id="charanVal">0</span> / 1000</div>
            <button id="charanBtn" class="action-btn charan-btn" onclick="addMiss('charan')">💙</button>
        </div>
    </div>

    <div class="footer-info">
        "Distance means so little when someone means so much."
    </div>

    <script>
        const GOAL = 1000;
        let secretClicks = 0;
        let user = localStorage.getItem('meter_user');

        function setIdentity(id) {
            localStorage.setItem('meter_user', id);
            location.reload();
        }

        async function syncScores() {
            try {
                const res = await fetch('/api/get-scores');
                const data = await res.json();
                
                const nPerc = (data.nishi / GOAL) * 100;
                const cPerc = (data.charan / GOAL) * 100;
                
                document.getElementById('nishiLiquid').style.height = Math.min(nPerc, 100) + '%';
                document.getElementById('charanLiquid').style.height = Math.min(cPerc, 100) + '%';
                
                document.getElementById('nishiVal').innerText = data.nishi;
                document.getElementById('charanVal').innerText = data.charan;
            } catch (e) {
                console.error("Sync failed. Ensure /api/get-scores exists.");
            }
        }

        async function addMiss(who) {
            // Optimistic update for instant feedback
            const el = document.getElementById(who + 'Val');
            el.innerText = parseInt(el.innerText) + 1;
            
            try {
                await fetch(`/api/update-score?who=${who}`);
                syncScores();
            } catch (e) {
                console.error("Update failed.");
            }
        }

        function handleSecret() {
            secretClicks++;
            if(secretClicks >= 5) {
                const pass = prompt("Admin Access:");
                if(pass === "charan123") {
                    localStorage.clear();
                    location.reload();
                }
                secretClicks = 0;
            }
        }

        if(user) {
            document.getElementById('overlay').classList.add('hidden');
            // User can only click the OTHER person's button
            document.getElementById(user + 'Btn').disabled = true;
            document.getElementById(user + 'Btn').innerHTML = "🔒";
        }

        // Initial sync and then every 5 seconds
        syncScores();
        setInterval(syncScores, 5000);
    </script>
</body>
</html>
